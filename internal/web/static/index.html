<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Manager</title>
  <script>
    (function () {
      const STORAGE_KEY = "photo-manager.locale";

      function parseLocale(raw) {
        if (!raw) {
          return "";
        }
        const token = String(raw).trim().split(",")[0].split(";")[0].trim().toLowerCase().replaceAll("_", "-");
        if (!token) {
          return "";
        }
        if (token.startsWith("zh")) {
          return "zh-CN";
        }
        if (token.startsWith("en")) {
          return "en";
        }
        return "";
      }

      let locale = "";
      try {
        locale = parseLocale(window.localStorage.getItem(STORAGE_KEY));
      } catch (error) {
        locale = "";
      }
      if (!locale) {
        const candidates = Array.isArray(window.navigator.languages) && window.navigator.languages.length
          ? window.navigator.languages
          : [window.navigator.language || "en"];
        for (const entry of candidates) {
          locale = parseLocale(entry);
          if (locale) {
            break;
          }
        }
      }
      if (!locale) {
        locale = "en";
      }
      document.documentElement.lang = locale;
      window.__photoManagerBootstrap = {
        locale,
        storageKey: STORAGE_KEY,
      };
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a id="skipLink" class="skip-link" href="#workspace">Skip to main content</a>

  <div id="app" class="app-shell">
    <header class="shell-header">
      <div id="statusBar" class="status-bar"></div>
      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
    </header>

    <main id="workspace" class="main-layout">
      <section id="browserView" class="view" aria-live="polite"></section>
      <section id="slideshowView" class="view" hidden aria-live="polite"></section>
    </main>
  </div>

  <div id="notice" class="notice" hidden></div>

  <div id="previewModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-preview="true"></div>
    <div class="modal-card preview-card" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="modal-header">
        <div>
          <p id="previewKicker" class="modal-kicker">Preview</p>
          <h2 id="previewTitle" class="modal-title">Image Preview</h2>
        </div>
        <button id="previewCloseButton" class="preview-close-button" type="button" aria-label="Close preview">X</button>
      </div>
      <div id="previewBody" class="preview-body"></div>
      <div id="previewControls" class="modal-footer preview-controls"></div>
    </div>
  </div>

  <div id="settingsModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-settings="true"></div>
    <div class="modal-card settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <div>
          <p id="settingsKicker" class="modal-kicker">Configuration</p>
          <h2 id="settingsTitle" class="modal-title">Keys And Actions</h2>
        </div>
        <button id="settingsCloseButton" class="ghost-button utility-button">Close</button>
      </div>
      <div id="settingsBody" class="settings-body"></div>
      <div class="modal-footer settings-footer">
        <span id="captureHint" class="capture-hint"></span>
        <button id="saveSettingsButton" class="primary-button utility-button">Save Settings</button>
      </div>
    </div>
  </div>

  <div id="helpModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-help="true"></div>
    <div class="modal-card help-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <div class="modal-header">
        <div>
          <p id="helpKicker" class="modal-kicker">Help</p>
          <h2 id="helpTitle" class="modal-title">Sorting Guide</h2>
        </div>
        <div class="modal-header-actions">
          <button id="helpSettingsButton" class="ghost-button utility-button help-header-button" type="button" data-toolbar-action="open-settings">Settings</button>
          <button id="helpCloseButton" class="ghost-button utility-button help-header-button" type="button">Close</button>
        </div>
      </div>
      <div id="helpBody" class="help-body"></div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
