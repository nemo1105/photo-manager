<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Manager</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a class="skip-link" href="#workspace">Skip to main content</a>

  <div id="app" class="app-shell">
    <header class="shell-header">
      <div id="statusBar" class="status-bar"></div>
      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
    </header>

    <main id="workspace" class="main-layout">
      <section id="browserView" class="view" aria-live="polite"></section>
      <section id="slideshowView" class="view" hidden aria-live="polite"></section>
    </main>
  </div>

  <div id="notice" class="notice" hidden></div>

  <div id="previewModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-preview="true"></div>
    <div class="modal-card preview-card" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="modal-header">
        <div>
          <p class="modal-kicker">Preview</p>
          <h2 id="previewTitle" class="modal-title">Image Preview</h2>
        </div>
        <button id="previewCloseButton" class="ghost-button utility-button">Close</button>
      </div>
      <div id="previewBody" class="preview-body"></div>
      <div id="previewControls" class="modal-footer"></div>
    </div>
  </div>

  <div id="settingsModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-settings="true"></div>
    <div class="modal-card settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <div>
          <p class="modal-kicker">Configuration</p>
          <h2 id="settingsTitle" class="modal-title">Keys And Actions</h2>
        </div>
        <button id="settingsCloseButton" class="ghost-button utility-button">Close</button>
      </div>
      <div id="settingsBody" class="settings-body"></div>
      <div class="modal-footer settings-footer">
        <div class="footer-actions">
          <button id="addMoveActionButton" class="secondary-button utility-button">Add Move</button>
          <button id="addDeleteActionButton" class="secondary-button utility-button">Add Delete</button>
          <button id="addRestoreActionButton" class="secondary-button utility-button">Add Restore</button>
        </div>
        <span id="captureHint" class="capture-hint"></span>
        <button id="saveSettingsButton" class="primary-button action-tile action-tile--compact">Save Settings</button>
      </div>
    </div>
  </div>

  <div id="helpModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-help="true"></div>
    <div class="modal-card help-card" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <div class="modal-header">
        <div>
          <p class="modal-kicker">Help</p>
          <h2 id="helpTitle" class="modal-title">Sorting Guide</h2>
        </div>
        <button id="helpCloseButton" class="ghost-button utility-button">Close</button>
      </div>
      <div id="helpBody" class="help-body"></div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
